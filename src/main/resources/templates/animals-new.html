  ║       src/main/resources/templates/animals-new.html              ║
  ║  2. Add xmlns:th="http://www.thymeleaf.org" to <html>            ║
  ║  3. In AnimalPageController add:                                 ║
  ║       @GetMapping("/animals/new")                                ║
  ║       public String newAnimalForm(Model model) {                 ║
  ║           model.addAttribute("form",                             ║
  ║               new AnimalForm(null,null,null,null,null,null));    ║
  ║           return "animals-new";                                  ║
  ║       }                                                          ║
  ║  4. Replace <form action=...> with th:action="@{/animals}"       ║
  ║     and add th:object="${form}" to <form>                        ║
  ║  5. Replace each name="..." with th:field="*{fieldName}"         ║
  ║     (you can remove name= and id= — th:field sets them)          ║
  ║  6. Add POST /animals → create + redirect                        ║
  ║                                                                  ║
  ║  ADMIN-only page (see SecurityConfig):                           ║
  ║  7. GET /animals/new and POST /animals are already restricted    ║
  ║     to ROLE_ADMIN on the backend. Also guard this page:          ║
  ║       @GetMapping("/animals/new") should redirect (or 403) non-  ║
  ║       admins instead of just relying on the security filter.     ║
  ║  8. Only link to this page ("Add animal" in the nav) when        ║
  ║     isAdmin is true.                                             ║

<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shelter — Add Animal</title>
  <style>
    body { font-family: sans-serif; max-width: 760px; margin: 2rem auto; padding: 0 1rem; }
    nav { background: #f1f5f9; padding: 0.6rem 1rem; border-radius: 6px; margin-bottom: 1.5rem; }
    nav a { margin-right: 1rem; text-decoration: none; color: #2563eb; }
    nav a:hover { text-decoration: underline; }
    h1 { border-bottom: 2px solid #333; padding-bottom: 0.4rem; }
    form { display: grid; gap: 0.5rem; max-width: 480px; margin-top: 1rem; }
    label { font-weight: bold; }
    input, select, textarea { padding: 0.4rem; border: 1px solid #ccc; border-radius: 4px; width: 100%; box-sizing: border-box; }
    button:not(.logout-link) { padding: 0.6rem 1.2rem; background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; width: fit-content; }
    button:not(.logout-link):hover { background: #1d4ed8; }
    .back-link { display: inline-block; margin-top: 1rem; color: #2563eb; }
    .logout-link {
      background: none;
      border: none;
      padding: 0;
      margin-right: 1rem;
      color: #2563eb;
      cursor: pointer;
      font-family: inherit;
      font-size: inherit;
    }

    .logout-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

<!-- Navigation — same on every page -->
<!-- ADMIN-only: only render the "Add animal" link when isAdmin is true -->
<div th:replace="~{fragments/nav :: nav}"></div>

<main>
  <h1>Add a new animal</h1>

  <!--
    TODO: replace action="/animals" with th:action="@{/animals}"
          add th:object="${form}" to <form>
          replace name="..." on each input with th:field="*{fieldName}"
  -->
  <form th:action="@{/animals}"
        th:object="${form}"
        method="post">

    <label for="name">Name</label>
    <input th:field="*{name}"
           type="text"
           required
           placeholder="e.g. Milo">

    <label for="type">Type</label>
    <select th:field="*{type}">
      <option value="">— choose —</option>
      <option value="CAT">Cat</option>
      <option value="DOG">Dog</option>
      <option value="OTHER">Other</option>
    </select>

    <label for="breed">Breed</label>
    <input th:field="*{breed}"
           type="text"
           placeholder="e.g. Siamese">

    <label for="age">Age (years)</label>
    <input th:field="*{age}"
           type="number"
           min="0"
           placeholder="e.g. 3">

    <label for="description">Description</label>
    <textarea th:field="*{description}"
              rows="3"
              placeholder="A short description of the animal's personality"></textarea>

    <label for="imageUrl">Image filename</label>
    <input th:field="*{imageUrl}"
           type="text"
           placeholder="luna.jpg">

    <button type="submit">Add animal</button>
  </form>

  <a href="/animals" class="back-link">← Back to list</a>
</main>

</body>
</html>
