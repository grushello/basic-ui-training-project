<!DOCTYPE html>
<!--
  ╔══════════════════════════════════════════════════════════════════╗
  ║  TASK A — ADD THYMELEAF                                          ║
  ╠══════════════════════════════════════════════════════════════════╣
  ║  This is a plain static HTML file — the animal list is           ║
  ║  hard-coded and the form does not work yet.                      ║
  ║                                                                  ║
  ║  Your job:                                                       ║
  ║  1. Move this file to:                                           ║
  ║       src/main/resources/templates/animals.html                  ║
  ║  2. Add the Thymeleaf namespace to <html>:                       ║
  ║       xmlns:th="http://www.thymeleaf.org"                        ║
  ║  3. Create AnimalPageController (in controller/)                 ║
  ║       @GetMapping("/animals")  → pass List<AnimalResponse>       ║
  ║       @GetMapping("/animals/new") → pass empty AnimalForm        ║
  ║       @PostMapping("/animals") → call service, redirect          ║
  ║  4. Replace the hard-coded <li> elements with th:each            ║
  ║  5. Add th:src / th:alt to the <img> tags                        ║
  ║     Keep width/height/object-fit as plain HTML attributes        ║
  ║  6. Update the form action with th:action and bind               ║
  ║     fields with th:object / th:field                             ║
  ║                                                                  ║
  ║  ROLE-BASED UI (adoption feature — see SecurityConfig):          ║
  ║  7. In AnimalPageController, expose "isAdmin"/"isUser" model     ║
  ║     attributes, derived from the current Authentication's        ║
  ║     authorities (ROLE_ADMIN / ROLE_USER — a logged-in user is    ║
  ║     never both).                                                 ║
  ║  8. Only render the "Add a new animal" section when isAdmin is   ║
  ║     true (the backend also rejects POST /animals for non-admins).║
  ║  9. Per animal, show an "Adopt" button only when isUser is true  ║
  ║     AND the animal's status is AVAILABLE. It should POST to      ║
  ║       /api/animals/{id}/adopt                                    ║
  ║ 10. When isAdmin is true and the animal is ADOPTED, display its  ║
  ║     adoptionNote (already computed server-side in                ║
  ║     AnimalResponse) next to the status — everyone else just      ║
  ║     sees the bare "ADOPTED" status.                              ║
  ╚══════════════════════════════════════════════════════════════════╝
-->
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shelter Animals</title>
  <style>
    body { font-family: sans-serif; max-width: 860px; margin: 2rem auto; padding: 0 1rem; }
    nav { background: #f1f5f9; padding: 0.6rem 1rem; border-radius: 6px; margin-bottom: 1.5rem; }
    nav a { margin-right: 1rem; text-decoration: none; color: #2563eb; }
    nav a:hover { text-decoration: underline; }
    h1 { border-bottom: 2px solid #333; padding-bottom: 0.4rem; }
    h2 { margin-top: 2rem; }
    ul { list-style: none; padding: 0; }
    li { border: 1px solid #ddd; border-radius: 6px; padding: 1rem; margin-bottom: 1rem; display: flex; gap: 1rem; align-items: flex-start; }
    li img { width: 120px; height: 80px; object-fit: cover; border-radius: 4px; }
    .info { flex: 1; }
    .status-available { color: green; font-weight: bold; }
    .status-adopted   { color: #999;  font-weight: bold; }
    form { display: grid; gap: 0.5rem; max-width: 480px; margin-top: 1rem; }
    label { font-weight: bold; }
    input, select, textarea { padding: 0.4rem; border: 1px solid #ccc; border-radius: 4px; width: 100%; box-sizing: border-box; }
    button:not(.logout-link) { padding: 0.6rem 1.2rem; background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; width: fit-content; }
    button:not(.logout-link):hover { background: #1d4ed8; }
    .logout-link {
      background: none;
      border: none;
      padding: 0;
      margin-right: 1rem;
      color: #2563eb;
      cursor: pointer;
      font-family: inherit;
      font-size: inherit;
    }

    .logout-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
  <main>
    <h1>Shelter Animals</h1>

    <!-- ═══════════════════════════════════════════════════════════
         HARD-CODED LIST — replace with th:each in Task A
         ═══════════════════════════════════════════════════════════ -->
    <section aria-label="Animal list">
      <ul>

        <li th:each="animal : ${animals}">

          <img th:src="${animal.imageUrl}"
               th:alt="'Photo of ' + ${animal.name}">


          <div class="info">

            <strong th:text="${animal.name}">
              Name
            </strong>


            <span th:text="' — '
              + ${animal.type}
              + ' | '
              + ${animal.breed}
              + ' | Age: '
              + ${animal.age}">
        </span>


            <span th:class="${animal.status.name() == 'AVAILABLE'}
                ? 'status-available'
                : 'status-adopted'"
                  th:text="${animal.status}">
            STATUS
        </span>


            <!-- ADMIN ONLY -->
            <span th:if="${isAdmin and animal.adoptionNote != null}"
                  th:text="${animal.adoptionNote}">
        </span>


            <p th:text="${animal.description}">
              Description
            </p>


            <!-- USER ONLY -->
            <form th:if="${isUser and animal.status.name() == 'AVAILABLE'}"
                  th:action="@{'/api/animals/' + ${animal.id} + '/adopt'}"
                  method="post">

              <button type="submit">
                Adopt
              </button>

            </form>


          </div>

        </li>

      </ul>
    </section>

    <!-- ═══════════════════════════════════════════════════════════
         ADD ANIMAL FORM — update action + bind fields in Task A
         ADMIN-only: wrap this whole <section> in th:if="${isAdmin}"
         ═══════════════════════════════════════════════════════════ -->
    <section aria-label="Add new animal">
      <h2>Add a new animal</h2>
      <form action="/animals" method="post">

        <label for="name">Name</label>
        <input id="name" name="name" type="text" required placeholder="e.g. Milo">

        <label for="type">Type</label>
        <select id="type" name="type">
          <option value="">— choose —</option>
          <option value="CAT">Cat</option>
          <option value="DOG">Dog</option>
          <option value="OTHER">Other</option>
        </select>

        <label for="breed">Breed</label>
        <input id="breed" name="breed" type="text" placeholder="e.g. Siamese">

        <label for="age">Age (years)</label>
        <input id="age" name="age" type="number" min="0" placeholder="e.g. 3">

        <label for="description">Description</label>
        <textarea id="description" name="description" rows="3"
                  placeholder="A short description of the animal's personality"></textarea>

         <label for="imageUrl">Image filename</label>
         <input id="imageUrl" name="imageUrl" type="text"
           placeholder="luna.jpg">

        <button type="submit">Add animal</button>
      </form>
    </section>
  </main>
</body>
</html>
